global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # PCM modular monolith
  - job_name: 'pcm'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['pcm:8080']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
