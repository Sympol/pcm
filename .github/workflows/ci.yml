name: PCM CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  # Opt into Node.js 24 for all actions ahead of the June 2026 forced migration
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 : Build & Unit Tests
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean install -DskipTests

    - name: Run Unit Tests
      run: mvn -B test

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: '**/target/*.jar'
        retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 : SAST — Static Application Security Testing  — Secure development & vulnerability management
  # ─────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (SpotBugs + Find Security Bugs)
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run SpotBugs with Find Security Bugs
      # find-sec-bugs plugin is declared in the root pom.xml spotbugs profile
      run: mvn -B compile spotbugs:check -Pspotbugs -DskipTests
      continue-on-error: false

    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-report
        path: '**/target/spotbugsXml.xml'
        retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 : Dependency Vulnerability Scan 
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan (OWASP)
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Cache the NVD database between runs to avoid re-downloading ~200 MB each time
    - name: Cache OWASP NVD database
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          owasp-nvd-${{ runner.os }}-

    - name: OWASP Dependency-Check (aggregate)
      # dependency-check:aggregate produces a single report at the root target/
      # -pl pcm-infrastructure-spring -am scans only the deployable module and its deps
      # NVD_API_KEY secret must be set in the repository settings; without it the
      # NVD returns 403/404 and the scan fails with NoDataException.
      # Get a free key at https://nvd.nist.gov/developers/request-an-api-key
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: |
        EXTRA_ARGS=""
        if [ -n "$NVD_API_KEY" ]; then
          EXTRA_ARGS="-DnvdApiKey=${NVD_API_KEY}"
        fi
        mvn -B dependency-check:aggregate \
          -pl pcm-infrastructure-spring -am \
          -DfailBuildOnCVSS=7 \
          -DsuppressionFile=.github/owasp-suppressions.xml \
          -Dformats=HTML,JSON \
          $EXTRA_ARGS \
          --no-transfer-progress
      continue-on-error: true   # upload the report even when vulnerabilities are found

    - name: Upload Dependency-Check report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: target/dependency-check/
        if-no-files-found: warn
        retention-days: 30

    # Fail the job AFTER uploading the report so the artifact is always available
    - name: Fail if high/critical CVEs found
      if: always()
      run: |
        if [ -f target/dependency-check/dependency-check-report.json ]; then
          HIGH=$(python3 -c "
        import json, sys
        data = json.load(open('target/dependency-check/dependency-check-report.json'))
        deps = data.get('dependencies', [])
        count = sum(
          1 for d in deps
          for v in d.get('vulnerabilities', [])
          if v.get('cvssv3', {}).get('baseScore', 0) >= 7
             or v.get('cvssv2', {}).get('score', 0) >= 7
        )
        print(count)
          ")
          if [ "$HIGH" -gt "0" ]; then
            echo "::error::$HIGH high/critical CVE(s) found. Review the dependency-check-report artifact."
            exit 1
          fi
        fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4 : SBOM Generation — Supplier security policy (software supply chain)
  # ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Generate CycloneDX SBOM
      run: mvn -B cyclonedx:makeAggregateBom -DskipTests

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom-cyclonedx
        path: target/bom.*
        retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5 : Secret Scanning — No credentials in source code
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
