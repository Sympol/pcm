services:

  # ── PCM Application (modular monolith) ──────────────────────────────────────
  pcm:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: pcm:latest
    container_name: pcm
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/${POSTGRES_DB:-pcm}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pcm}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Vault
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID}
      # Encryption
      ENCRYPTION_ENVIRONMENT: ${ENCRYPTION_ENVIRONMENT:-DEV}
      BLIND_INDEX_GLOBAL_SALT: ${BLIND_INDEX_GLOBAL_SALT}
      KMS_PROVIDER: ${KMS_PROVIDER:-}
      KMS_ENDPOINT: ${KMS_ENDPOINT:-}
      KMS_MTLS_ENABLED: ${KMS_MTLS_ENABLED:-false}
      AUDIT_LOG_LEVEL: ${AUDIT_LOG_LEVEL:-HIGH}
      # Observability
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      postgresql:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - pcm-network
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: pcm-postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pcm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pcm}
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pcm} -d ${POSTGRES_DB:-pcm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pcm-network
    restart: unless-stopped

  # ── HashiCorp Vault (dev mode) ───────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: pcm-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    command: server -dev -dev-root-token-id="${VAULT_DEV_ROOT_TOKEN_ID}" -dev-listen-address="0.0.0.0:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pcm-network
    restart: unless-stopped

  # ── Keycloak (Identity & Access Management) ──────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: pcm-keycloak
    command: start-dev --import-realm
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8090
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_PORT: 8080
      KC_HTTP_RELATIVE_PATH: /auth
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8090:8080"
    volumes:
      - ./docker/keycloak/pcm-realm.json:/opt/keycloak/data/import/pcm-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/auth/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - pcm-network
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: pcm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - pcm-network
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: pcm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - pcm-network
    restart: unless-stopped

  # ── Jaeger (distributed tracing) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.59
    container_name: pcm-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - pcm-network
    restart: unless-stopped

  # ── OpenTelemetry Collector ───────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: pcm-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger
      - prometheus
    networks:
      - pcm-network
    restart: unless-stopped

  # ── pgAdmin (optional dev tool) ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.9
    container_name: pcm-pgadmin
    profiles: ["tools"]   # only starts with: docker compose --profile tools up
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@pcm.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pcm-network

volumes:
  postgresql_data:
  vault_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:

networks:
  pcm-network:
    driver: bridge
