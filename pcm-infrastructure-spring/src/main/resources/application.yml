spring:
  application:
    name: pcm-modular-monolith
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/pcm
    username: pcm_user
    password: ${DB_PASSWORD:pcm_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history
    validate-on-migrate: true
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# Server Configuration
server:
  port: 8080
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    dev.vibeafrika.pcm: DEBUG
    org.springframework.web: INFO
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Preference Context Configuration
preference:
  max-settings-per-preference: 100
  caching-enabled: true
  cache-ttl-seconds: 300
  versioning-enabled: true
  deleted-preference-retention-days: 30

# Profile Context Configuration
profile:
  max-attributes-per-profile: 100
  versioning-enabled: true
  deleted-profile-retention-days: 90

# Consent Context Configuration
consent:
  consent-retention-years: 7
  enable-tcf-integration: true

# Segment Context Configuration
segment:
  max-segments-per-tenant: 500
  evaluation-cache-enabled: true
  evaluation-cache-ttl-seconds: 600
